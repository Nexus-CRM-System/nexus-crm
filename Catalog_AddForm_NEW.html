  <style>
    /* Намертво блокируем внешние сдвиги окна */
    html, body {
      overflow: hidden !important; 
      height: 100vh !important;
      width: 100vw !important;
      box-sizing: border-box !important;
    }
   
    .full-screen-wrapper {
      box-sizing: border-box !important;
      padding: 15px !important;
      display: flex !important; 
      flex-direction: column !important;
      height: 100vh !important;
      width: 100% !important;
      overflow: hidden !important;
    }

    /* Адаптивная 5-колоночная матрица NEXUS с выравниванием рядов */
    .hud-grid-block {
      display: grid !important;
      grid-template-columns: repeat(5, minmax(0, 1fr)) !important; 
      gap: 12px 10px !important; 
      width: 100% !important;
      box-sizing: border-box !important;
      flex: 1;
      overflow-y: auto !important; 
      overflow-x: hidden !important; 
      padding-right: 5px;
      align-items: end !important; /* ГАРАНТИЯ: Весь ряд инпутов всегда выстроен по одной нижней линейке! */
    }

    /* Подкручиваем саму ячейку, увеличивая верхний коридор под текст */
    .field-group {
      display: grid !important;
      grid-template-rows: auto 28px !important; /* Авто-высота под текст + жесткие 28px под инпут */
      width: 100% !important;
      box-sizing: border-box !important;
      align-items: end !important;
    }
   
    /* ИСПРАВЛЕНО: Разрешаем мягкий перенос длинных слов заголовка */
    .field-group label {
      margin-bottom: 2px !important;
      padding: 0 !important;
      line-height: 1.1 !important;
      white-space: normal !important; /* РАЗРЕШИЛИ ПЕРЕНОС: Текст пойдет на вторую строку! */
      word-break: break-word !important;
      display: block !important;
    }

    /* Сдвоенные инпуты внутри жесткого коридора 28px */
    .cyber-split-input {
      display: grid !important;
      grid-template-columns: 4fr 6fr !important; 
      gap: 5px !important;
      width: 100% !important;
      box-sizing: border-box !important;
      height: 28px !important;
    }
   
    .cyber-split-input input, .cyber-split-input select { height: 28px !important; }
   
    /* Сетка медиа-матрицы из 10 фото (5 в ряд) */
    .photo-grid-layout { 
      display: grid !important; 
      grid-template-columns: repeat(5, minmax(0, 1fr)) !important; 
      gap: 8px !important; 
      margin-top: 4px !important; 
      width: 100% !important;
      box-sizing: border-box !important;
    }
   
    .photo-cell { display: flex; flex-direction: column; position: relative; width: 100% !important; box-sizing: border-box !important; }
    .photo-cell label { font-size: 10px !important; margin-bottom: 3px !important; color: rgba(28, 253, 255, 0.8) !important; text-shadow: none !important; }
    .photo-cell .hud-btn { height: 26px !important; padding: 0 4px !important; font-size: 10px !important; width: 100% !important; }

    /* ИСПРАВЛЕНО: Чистый Grid-класс для широких окон описания без наследования флексов */
    .full-width {
      grid-column: span 5 !important;
      display: grid !important;
      grid-template-rows: 18px 120px !important; /* Намертво задаем 18px под имя и 120px под просторное текстовое окно */
      width: 100% !important;
      box-sizing: border-box !important;
      margin-top: 10px !important;
      align-items: end !important;
    }
    
    .full-width label { 
      margin-bottom: 2px !important; 
      padding: 0 !important;
      line-height: 1.2 !important;
      display: block !important;
    }

    /* Высота и рамки просторных окон описания и спецификаций */
    textarea.description-box { 
      height: 120px !important; /* Идеальные 5 строк ввода */
      resize: none !important; 
      width: 100% !important; 
      background: #041620 !important;
      border: 1px solid #1cfdff !important;
      color: #fff !important;
      padding: 6px 10px !important;
      font-family: inherit !important;
      font-size: 12px !important;
      box-sizing: border-box !important;
      border-radius: 2px !important;
    }

        /* КИБЕР-МОДАЛЬНОЕ ОКНО ЗАПРОСА NEXUS */
    .nexus-prompt-overlay {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      background: rgba(4, 20, 29, 0.85) !important;
      backdrop-filter: blur(4px) !important; /* Размытие заднего плана */
      z-index: 100000 !important;
      display: none; /* По умолчанию скрыто */
      justify-content: center !important;
      align-items: center !important;
      box-sizing: border-box !important;
    }
    
    .nexus-prompt-window {
      background: #061e2a !important;
      border: 1px solid #1cfdff !important;
      box-shadow: 0 0 20px rgba(28, 253, 255, 0.25) !important;
      padding: 20px !important;
      width: 420px !important; /* Увеличили с 380px до 420px под три кнопки */
      border-radius: 4px !important;
      box-sizing: border-box !important;
      font-family: inherit !important;
    }

    .nexus-prompt-text {
      font-size: 12px !important;
      line-height: 1.4 !important;
      color: #fff !important;
      margin-bottom: 12px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
    }
    
    .nexus-prompt-input {
      width: 100% !important;
      height: 28px !important;
      background: #04141d !important;
      border: 1px solid rgba(28, 253, 255, 0.4) !important;
      color: #fff !important;
      padding: 0 8px !important;
      font-size: 12px !important;
      box-sizing: border-box !important;
      margin-bottom: 15px !important;
      border-radius: 2px !important;
    }
    .nexus-prompt-input:focus { border-color: #1cfdff !important; outline: none !important; box-shadow: 0 0 8px rgba(28, 253, 255, 0.4) !important; }
    
    .nexus-prompt-buttons { display: flex !important; gap: 10px !important; justify-content: flex-end !important; }
    .nexus-prompt-buttons .hud-btn { height: 26px !important; padding: 0 15px !important; font-size: 11px !important; width: auto !important; }

        /* УНИКАЛЬНАЯ СТИЛИЗАЦИЯ КНОПОК МИКРО-ОКНА NEXUS */
    .nexus-btn-pc {
      background: #ffaa00 !important;
      border: 1px solid #ffaa00 !important;
      color: #04141d !important; /* Черный читаемый текст на янтарном фоне */
      font-weight: 700 !important;
      box-shadow: 0 0 10px rgba(255, 170, 0, 0.3) !important;
    }
    .nexus-btn-pc:hover {
      background: #ffbc33 !important;
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.6) !important;
    }

    .nexus-btn-ok {
      background: #1cfdff !important;
      border: 1px solid #1cfdff !important;
      color: #04141d !important; /* Черный читаемый текст на бирюзовом фоне */
      font-weight: 700 !important;
      box-shadow: 0 0 10px rgba(28, 253, 255, 0.3) !important;
    }
    .nexus-btn-ok:hover {
      background: #5effff !important;

    .nexus-btn-cancel {
      background: rgba(255, 255, 255, 0.05) !important;

      color: #fff !important;
      border-color: rgba(255, 255, 255, 0.5) !important;
    }

  <!-- ХАЙ-ТЕК ОКНО ЗАПРОСА МЕДИА-ПОТОКА NEXUS (ВЕРСИЯ 2.0) -->
  <div class="nexus-prompt-overlay" id="nexusPromptModal">
    <div class="nexus-prompt-window">
      <div class="nexus-prompt-text" style="font-size: 11px !important; letter-spacing: 0.8px !important; margin-bottom: 15px !important;">
        Вставьте интернет-ссылку на фото, или загрузите файл с ПК через <span style="color:#1cfdff; font-weight:bold;">"Мой компьютер"</span>:
      </div>
      <input type="text" class="nexus-prompt-input" id="nexusPromptInputField" autocomplete="off" placeholder="https://site.ru">
        <div class="nexus-prompt-buttons" style="display: flex !important; gap: 10px !important; justify-content: flex-end !important; width: 100% !important;">
        <!-- Три монолитные кнопки в один ряд с идеальным контрастом текста -->
        <button type="button" class="hud-btn nexus-btn-pc" onclick="triggerPcFolderUploadWorkflow()">МОЙ КОМПЬЮТЕР</button>
        <button type="button" id="nexusPromptOkBtn" class="hud-btn nexus-btn-ok" onclick="processNexusCustomPromptResult(event)">ПОДТВЕРДИТЬ</button>
        <button type="button" class="hud-btn nexus-btn-cancel" onclick="closeNexusCustomPrompt()">ОТМЕНА</button>
      </div>
    </div>

  </form>

<script>

// ====================================================================
// СТАРТОВАЯ ИНИЦИАЛИЗАЦИЯ И ДИНАМИЧЕСКИЙ ПЕРЕВОД ПОДПИСЕЙ ИЗ КОНСТАНТ
// ====================================================================
window.onload = function() {
  const formElement = document.getElementById('hudAddForm');
  var editRow = "<?= editRowNumber ?>";
  
  if (!editRow || editRow === "0") {
    if (formElement) formElement.reset();
  }
  
  // Гарантируем свободу вертикального скролла на уровне браузера
  document.body.style.overflowY = "auto";
  document.body.style.height = "auto";
  
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    runHudCascade(["Инициализация матрицы CRM...", "Синхронизация карты метаданных"], "#00f3ff");
    
    google.script.run
      .withSuccessHandler(function(constants) {
        populateSelects(constants);
        
        const map = constants.catalog_map;
        if (map) {
          // ВСЕЯДНЫЙ ПЕРЕВОДЧИК: Ищет заголовки и в обычных .field-group, и в широких .full-width
          const applyLabel = (inputName, labelText) => {
            const input = formElement.elements[inputName];
            if (input) {
              const group = input.closest('.field-group') || input.closest('.full-width');
              if (group) {
                const lbl = group.querySelector('label');
                if (lbl) lbl.textContent = labelText;
              }
            }
          };

          // Раскладываем чистые имена полей
          applyLabel('record_type', map.record_type.label);
          applyLabel('name', map.name.label);
          applyLabel('brand', map.brand.label);
          applyLabel('sku', map.sku.label);
          applyLabel('barcode', map.barcode.label);
          applyLabel('category', map.category.label);
          applyLabel('subcategory', map.subcategory.label);
          applyLabel('group', map.group.label);
          applyLabel('mod', map.modification.label);
          
          applyLabel('stock', map.stock_qty.label);
          applyLabel('min_stock', map.min_stock_qty.label);
          applyLabel('year', map.production_year.label);
          applyLabel('warranty_num', map.warranty_val.label);
          applyLabel('weight_num', map.weight_val.label);
          
          applyLabel('price_buy', map.price_buy.label);
          applyLabel('price_opt', map.price_wholesale.label);
          applyLabel('price_retail', map.price_retail.label);
          applyLabel('prod_cost', map.production_cost.label);
          applyLabel('currency', map.currency.label);
          
          applyLabel('time_norm', map.time_norm_val.label);
          applyLabel('duration_num', map.duration_val.label);
          
          applyLabel('cell', map.warehouse_cell.label);
          applyLabel('calc_type', map.calc_type.label);
          applyLabel('responsible', map.responsible_user.label);
          applyLabel('supplier', map.vendor_supplier.label);
          applyLabel('vat_rate', map.vat_rate.label);
          
          // Длинные блоки подвала
          applyLabel('specification', map.specification.label);
          applyLabel('description', map.description.label);
          applyLabel('comment', map.internal_comment.label);
          
          // Изолированный перевод для сдвоенного поля идентификаторов
          const idInput = formElement.elements['item_id_val'];
          if (idInput) {
            const idGroup = idInput.closest('.field-group');
            if (idGroup) {
              const idLabel = idGroup.querySelector('label');
              if (idLabel) {
                idLabel.textContent = map.code_type.label + " / " + map.code_value.label;
              }
            }
          }
        }
        
        // Если открыт режим правки — подгружаем данные строки
        if (editRow && editRow !== "0") {
          const formLoader = document.getElementById('hudFormLoader');
          if (formLoader) formLoader.style.display = "block";
          
          runHudCascade(["РЕЖИМ ПРАВКИ: РАЗВЕРТЫВАНИЕ СТРОКИ " + editRow], "#ffaa00");
          
          google.script.run
            .withSuccessHandler(function(rowData) {
              fillFormFieldsForEditing(rowData);
              if (formLoader) formLoader.style.display = "none";
            })
            .getTableRowDataByRowIndex(Number(editRow));
        }
      })
      .withFailureHandler(function(err) {
        runHudCascade(["КРИТИЧЕСКИЙ СБОЙ СИНХРОНИЗАЦИИ", err.message], "#ff3333");
      })
      .getConstantsForForm();

    // СБОР УНИКАЛЬНЫХ ПОДСКАЗОК ДЛЯ ГРУПП И МОДИФИКАЦИЙ
    google.script.run
      .withSuccessHandler(function(suggestions) {
        if (!suggestions) return;
        const groupDataList = document.getElementById('existingGroupsList');
        if (groupDataList && suggestions.groups) {
          groupDataList.innerHTML = "";
          suggestions.groups.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            groupDataList.appendChild(option);
          });
        }
        const modDataList = document.getElementById('existingModsList');
        if (modDataList && suggestions.mods) {
          modDataList.innerHTML = "";
          suggestions.mods.forEach(item => {
            const option = document.createElement('option');
            option.value = item;
            modDataList.appendChild(option);
          });
        }
      })
      .getUniqueGroupsAndModifications();
  }
};

// ====================================================================
// ФУНКЦИЯ ДИНАМИЧЕСКОЙ РАСКЛАДКИ ДАННЫХ ПРИ ПРАВКЕ ПОЗИЦИИ
// ====================================================================
function fillFormFieldsForEditing(rowData) {
  if (!rowData) return;
  const form = document.getElementById('hudAddForm');
  if (!form) return;
  
  // Автоматически распределяем данные по совпадениям имен инпутов формы
  for (let key in rowData) {
    if (form.elements[key]) {
      form.elements[key].value = rowData[key];
    }
  }
  
  // Точечные сопоставления под новые латинские системные ID констант
  if (rowData.modification && form.elements['mod']) form.elements['mod'].value = rowData.modification;
  if (rowData.stock_qty && form.elements['stock']) form.elements['stock'].value = rowData.stock_qty;
  if (rowData.min_stock_qty && form.elements['min_stock']) form.elements['min_stock'].value = rowData.min_stock_qty;
  if (rowData.production_year && form.elements['year']) form.elements['year'].value = rowData.production_year;
  if (rowData.warranty_val && form.elements['warranty_num']) form.elements['warranty_num'].value = rowData.warranty_val;
  if (rowData.weight_val && form.elements['weight_num']) form.elements['weight_num'].value = rowData.weight_val;
  if (rowData.price_wholesale && form.elements['price_opt']) form.elements['price_opt'].value = rowData.price_wholesale;
  if (rowData.production_cost && form.elements['prod_cost']) form.elements['prod_cost'].value = rowData.production_cost;
  if (rowData.time_norm_val && form.elements['time_norm']) form.elements['time_norm'].value = rowData.time_norm_val;
  if (rowData.duration_val && form.elements['duration_num']) form.elements['duration_num'].value = rowData.duration_val;
  if (rowData.responsible_user && form.elements['responsible']) form.elements['responsible'].value = rowData.responsible_user;
  if (rowData.warehouse_cell && form.elements['cell']) form.elements['cell'].value = rowData.warehouse_cell;
  if (rowData.internal_comment && form.elements['comment']) form.elements['comment'].value = rowData.internal_comment;
  if (rowData.vendor_supplier && form.elements['supplier']) form.elements['supplier'].value = rowData.vendor_supplier;
  if (rowData.vat_rate && form.elements['vat_rate']) form.elements['vat_rate'].value = rowData.vat_rate;
  if (rowData.code_type) form.elements['vid_id'].value = rowData.code_type;
  if (rowData.code_value) form.elements['item_id_val'].value = rowData.code_value;

  
  // Ювелирно разбираем матрицу изображений из поля photos_raw
  if (rowData.photos_raw) {
    try {
      var photosArr = JSON.parse(rowData.photos_raw);
      if (Array.isArray(photosArr)) {
        photosArr.forEach((url, index) => {
          var imgNum = index + 1;
          var idName = 'img_' + (imgNum < 10 ? '0' + imgNum : imgNum);
          var btnId = 'btn_' + (imgNum < 10 ? '0' + imgNum : imgNum);
          var hiddenInput = document.getElementById(idName);
          var btn = document.getElementById(btnId);
          
          if (hiddenInput && url) {
            hiddenInput.value = url;
            if (btn) {
              btn.textContent = "ГОТОВО ✓";
              btn.style.borderColor = "#00ff66";
              btn.style.color = "#00ff66";
              
              const cell = btn.parentElement;
              if (cell) {
                const xBtn = cell.querySelector('.nexus-delete-x');
                if (xBtn) xBtn.style.display = "block";
              }
            }
          }
        });
      }
    } catch(e) {
      // Поддержка старых одиночных ссылок, если в ячейке не JSON
      var hiddenInput01 = document.getElementById('img_01');
      var btn01 = document.getElementById('btn_01');
      if (hiddenInput01 && rowData.photos_raw !== "") {
        hiddenInput01.value = rowData.photos_raw;
        if (btn01) {
          btn01.textContent = "ГОТОВО ✓";
          btn01.style.borderColor = "#00ff66";
          btn01.style.color = "#00ff66";
        }
      }
    }
  }
  runHudCascade(["МАТРИЦА ХАРАКТЕРИСТИК УСПЕШНО РАЗВЕРНУТА"], "#00ff66");
}

// ====================================================================
// АВТОМАТИЧЕСКОЕ НАПОЛНЕНИЕ ВЫПАДАЮЩИХ СПИСКОВ ИЗ БАЗЫ КОНСТАНТ
// ====================================================================
function populateSelects(constants) {
  if (!constants) return;
  
  const mappings = {
    'dyn_record_type': constants.record_types,
    'dyn_vid_id': constants.vid_ids,
    'dyn_status': constants.statuses,
    'dyn_currency': constants.currencies,
    'dyn_calc_type': constants.calc_types,
    'dyn_unit': constants.units_qty, 
    'dyn_weight': constants.units_weight, 
    'dyn_warranty': constants.units_warranty, 
    'dyn_time_norm': constants.units_time_norm, 
    'dyn_duration': constants.units_duration,
    'dyn_vat_rate': constants.vat_rate 
  };

  for (let id in mappings) {
    const select = document.getElementById(id);
    if (!select) continue;
    select.innerHTML = '';
    select.style.color = '#fff';
    
    const emptyOpt = document.createElement('option');
    emptyOpt.value = '';
    emptyOpt.textContent = '';
    select.appendChild(emptyOpt);
    if (mappings[id]) {
      mappings[id].forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    }
  }

  const protectedFields = {
    'dyn_category': { data: constants.categories, msg: 'КАТЕГОРИИ НЕ ДОБАВЛЕНЫ' },
    'dyn_subcategory': { data: constants.subcategories, msg: 'ПОДКАТЕГОРИИ НЕ ДОБАВЛЕНЫ' },
    'dyn_responsible': { data: constants.responsibles, msg: 'СОТРУДНИКИ НЕ ДОБАВЛЕНЫ' },
    'dyn_supplier': { data: constants.suppliers, msg: 'ПОСТАВЩИКИ НЕ ДОБАВЛЕНЫ' }
  };

  for (let id in protectedFields) {
    const select = document.getElementById(id);
    if (!select) continue;
    select.innerHTML = '';
    select.style.color = '#fff';
    
    const emptyOpt = document.createElement('option');
    emptyOpt.value = '';
    emptyOpt.textContent = '';
    select.appendChild(emptyOpt);
    
    const currentData = protectedFields[id].data;
    if (currentData && currentData.length > 0) {
      currentData.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item;
        opt.textContent = item;
        select.appendChild(opt);
      });
    } else {
      const alertOpt = document.createElement('option');
      alertOpt.value = '';
      alertOpt.textContent = protectedFields[id].msg;
      alertOpt.style.color = '#ffaa00';
      alertOpt.disabled = true;
      select.appendChild(alertOpt);
    }
  }
  
  if (typeof showHudConsoleMessage === 'function') {
    showHudConsoleMessage("Интерфейс CRM полностью готов к безопасной работе", false);
  }
}

// ====================================================================
// ЖЕЛЕЗОБЕТОННЫЙ ДВИЖОК СБОРА И УМНОГО СОХРАНЕНИЯ (БЕЗОПАСНАЯ ПЕРЕЗАПИСЬ)
// ====================================================================
function submitForm(event) {
  event.preventDefault(); 
  
  const formElement = document.getElementById('hudAddForm');
  const saveBtn = document.getElementById('submitBtn');
  
  if (!formElement || !saveBtn) return;
  saveBtn.disabled = true;
  
  var editRow = "<?= editRowNumber ?>";
  var isEditMode = (editRow && editRow !== "0");
  const formLoader = document.getElementById('hudFormLoader');
  
  if (formLoader) {
    formLoader.style.color = "#ffaa00";
    formLoader.innerText = isEditMode ? "ОБНОВЛЕНИЕ ДАННЫХ..." : "ЗАПИСЬ ДАННЫХ В КАТАЛОГ...";
    formLoader.style.display = "block";
  }

  const formData = new FormData(formElement);
  const payload = {};
  formData.forEach((value, key) => { payload[key] = value; });

  // Сборка массива фотографий из медиа-матрицы
  const photosArray = [];
  for (let i = 1; i <= 10; i++) {
    const idName = 'img_' + (i < 10 ? '0' + i : i);
    const hiddenInput = document.getElementById(idName);
    if (hiddenInput && hiddenInput.value) {
      const cleanUrl = hiddenInput.value.toString().trim();
      if (cleanUrl !== "") photosArray.push(cleanUrl);
    }
    delete payload[idName];
  }

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    if (isEditMode) {
      // РЕЖИМ ПРАВКИ: Достаем оригинальный ID позиции из скрытого инпута
      var currentItemId = payload['system_id_hidden'];
      
      payload['item_id'] = payload['system_id_hidden']; 
      payload['item_id_val'] = payload['item_id_val'];
      
      google.script.run
        .withSuccessHandler(function(response) {
          saveBtn.disabled = false;
          if (response.success) {
            if (formLoader) {
              formLoader.style.color = "#00ff66";
              formLoader.innerText = "ДАННЫЕ УСПЕШНО ИНТЕГРИРОВАНЫ ✓";
            }
            setTimeout(function() { google.script.host.close(); }, 1200);
          } else {
            if (formLoader) formLoader.style.display = "none";
            alert("Ошибка обновления: " + response.msg);
          }
        })
        .withFailureHandler(function(err) {
          saveBtn.disabled = false;
          if (formLoader) formLoader.style.display = "none";
          alert("Критический сбой сетевого моста: " + err.message);
        })
        .updateCatalogCardData(currentItemId, payload, photosArray);
        
    } else {
      // РЕЖИМ СОЗДАНИЯ ТОВАРА: Стандартный шлюз
      payload['photo_raw'] = JSON.stringify(photosArray);
      payload['item_id'] = payload['item_id_val'];
      
      google.script.run
        .withSuccessHandler(function(response) {
          saveBtn.disabled = false;
          if (formLoader) {
            formLoader.style.color = "#00ff66";
            formLoader.innerText = "ПОЗИЦИЯ ИНТЕГРИРОВАНА ✓";
            setTimeout(function() { formLoader.style.display = "none"; }, 2000);
          }
          resetFormWithMsg();
        })
        .withFailureHandler(function(err) {
          saveBtn.disabled = false;
          if (formLoader) formLoader.style.display = "none";
          alert("Сбой сохранения новой карточки: " + err.message);
        })
        .saveCatalogCard(payload);
    }
  }
}

// ====================================================================
// КИБЕР-МАСКИ ДЛЯ ФИЛЬТРАЦИИ СИМВОЛОВ НА ЛЕТУ
// ====================================================================
function cyberInt(input) {
  input.value = input.value.replace(/[^0-9]/g, '');
}

function cyberFloat(input) {
  let val = input.value.replace(/,/g, '.');
  val = val.replace(/[^0-9.]/g, '');
  const parts = val.split('.');
  if (parts.length > 2) {
    val = parts[0] + '.' + parts.slice(1).join('');
  }
  input.value = val;
}

// ====================================================================
// МОДЕРНИЗИРОВАННЫЙ ДВИЖОК ПОЛНОЙ ОЧИСТКИ ФОРМЫ И МЕДИА-МАТРИЦЫ
// ====================================================================
function resetFormWithMsg() {
  const formElement = document.getElementById('hudAddForm');
  if (!formElement) return;
  
  formElement.reset();
  
  const textAreas = formElement.querySelectorAll('textarea.description-box');
  textAreas.forEach(area => {
    area.value = '';
  });
  
  for (let i = 1; i <= 10; i++) {
    const hiddenInput = document.getElementById('img_' + (i < 10 ? '0' + i : i));
    if (hiddenInput) hiddenInput.value = '';
  }
  
  const allPhotoButtons = formElement.querySelectorAll('.photo-cell button');
  allPhotoButtons.forEach(btn => {
    btn.disabled = false;
    btn.textContent = "ВЫБРАТЬ ФАЙЛ";
    btn.style.borderColor = "#1cfdff";
    btn.style.color = "#1cfdff";
    
    // Скрываем крестики при сбросе
    const cell = btn.parentElement;
    if (cell) {
      const xBtn = cell.querySelector('.nexus-delete-x');
      if (xBtn) xBtn.style.display = "none";
    }
  });

  const itemIdField = formElement.elements['item_id'];
  if (itemIdField) {
    itemIdField.disabled = false;
    itemIdField.placeholder = "";
  }
  
  if (typeof showHudConsoleMessage === 'function') {
    showHudConsoleMessage("Форма очищена", false);
  }
}

// ====================================================================
// ФИРМЕННЫЙ КАСКАДНЫЙ HUD-ИНФОРМАТОР
// ====================================================================
function runHudCascade(lines, color = "#00f3ff") {
  const consoleContainer = document.getElementById('hudConsoleLinesContainer');
  if (!consoleContainer) return;
  
  consoleContainer.innerHTML = '';
  if (lines && lines.length > 0) {
    lines.forEach((text, index) => {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'hud-console-line';
      lineDiv.style.color = color;
      lineDiv.style.animationDelay = (index * 0.4) + 's';
      lineDiv.textContent = `${text.toUpperCase()}`;
      consoleContainer.appendChild(lineDiv);
    });
  }
}

// ====================================================================
// СКОРОСТНОЙ СКРИПТ АВТОСЖАТИЯ И ЗАГРУЗКИ КАРТИНОК НА ДИСК
// ====================================================================
function handleFileUpload(inputElement, hiddenInputId, buttonId) {
  const file = inputElement.files[0]; 
  const btn = document.getElementById(buttonId);
  const hiddenInput = document.getElementById(hiddenInputId);
  
  if (!file || !btn || !hiddenInput) return;
  btn.disabled = true;
  btn.textContent = "СЖАТИЕ...";
  
  if (typeof showConsoleMessage === 'function') {
    showConsoleMessage("ОПТИМИЗАЦИЯ И СЖАТИЕ ИЗОБРАЖЕНИЯ... ", false);
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const MAX_WIDTH = 1024;
      const MAX_HEIGHT = 1024;
      let width = img.width;
      let height = img.height;
      
      if (width > height) {
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
      } else {
        if (height > MAX_HEIGHT) {
          width *= MAX_HEIGHT / height;
          height = MAX_HEIGHT;
        }
      }
      
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      const compressedBase64 = canvas.toDataURL('image/jpeg', 0.75);
      btn.textContent = "ЗАГРУЗКА...";
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            if (response && response.success) {
              hiddenInput.value = response.url;
              btn.disabled = false;
              btn.textContent = "ГОТОВО ✓";
              btn.style.borderColor = "#00ff66";
              btn.style.color = "#00ff66";
              
              const cell = btn.parentElement;
              if (cell) {
                const xBtn = cell.querySelector('.nexus-delete-x');
                if (xBtn) xBtn.style.display = "block";
              }
            } else {
              btn.disabled = false;
              btn.textContent = "ОШИБКА";
              alert("Ошибка Drive: " + response.msg);
            }
          })
          .withFailureHandler(function(err) {
            btn.disabled = false;
            btn.textContent = "СБОЙ СЕТИ";
            alert("Сбой моста загрузки: " + err.message);
          })
          .uploadCatalogPhotoToServer(compressedBase64, file.name);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}


// ====================================================================
// УМНЫЙ ДВУХРЕЖИМНЫЙ ЗАГРУЗЧИК МЕДИА-МАТРИЦЫ (ФАЙЛ / ССЫЛКА ИЗ СЕТИ)
// ====================================================================
var currentActivePhotoSlot = null;

function selectPhotoWorkflow(num) {
  currentActivePhotoSlot = num;
  const modal = document.getElementById('nexusPromptModal');
  const input = document.getElementById('nexusPromptInputField');
  
  if (modal && input) {
    input.value = ""; // Зачищаем старый след в инпуте
    modal.style.display = "flex"; // Разворачиваем оверлей по центру
    input.focus(); // Ставим курсор в фокус ввода
    
    document.getElementById('nexusPromptOkBtn').onclick = function(e) {
      processNexusCustomPromptResult(e);
    };
    
    input.onkeydown = function(e) {
      if (e.key === "Enter") {
        processNexusCustomPromptResult(e);
      }
    };
  }
}

// ====================================================================
// ???
// ====================================================================
function closeNexusCustomPrompt() {
  const modal = document.getElementById('nexusPromptModal');
  if (modal) modal.style.display = "none";
  currentActivePhotoSlot = null;
}

// ====================================================================
// ДЕЙСТВИЕ 1: Менеджер нажал желтую кнопку "МОЙ КОМПЬЮТЕР"
// ====================================================================
function triggerPcFolderUploadWorkflow() {
  if (currentActivePhotoSlot === null) return;
  var idIdx = currentActivePhotoSlot < 10 ? '0' + currentActivePhotoSlot : currentActivePhotoSlot;
  
  // Закрываем наше кастомное окно
  closeNexusCustomPrompt();
  
  // Мгновенно симулируем клик по твоему родному скрытому загрузчику файлов с компьютера
  var fileInputPC = document.getElementById('file_' + idIdx); // Исправлено под твою оригинальную разметку file_01
  if (fileInputPC) {
    fileInputPC.click(); 
  }
}

// ====================================================================
// ДЕЙСТВИЕ 2: Менеджер вставил URL-адрес и нажал "ПОДТВЕРДИТЬ" (или Enter)
// ====================================================================
function processNexusCustomPromptResult(event) {
  // ПРИНУДИТЕЛЬНЫЙ БЛОКИРОВЩИК: запрещаем форме перехватывать клик
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  
  const modalContainer = document.getElementById('nexusPromptModal');
  let input = document.getElementById('nexusPromptInputField');
  
  if (!input && modalContainer) {
    input = modalContainer.querySelector('input[type="text"]');
  }
  
  // ВАЖНО: Проверяем слот ДО закрытия окна, пока он не стерся!
  if (!input || currentActivePhotoSlot === null) {
    closeNexusCustomPrompt();
    return;
  }
  
  var urlChoice = input.value.trim();
  if (urlChoice === "") {
    closeNexusCustomPrompt();
    return;
  }
  
  // Вычисляем номер слота (01, 02 и т.д.)
  var slotNum = currentActivePhotoSlot < 10 ? '0' + currentActivePhotoSlot : currentActivePhotoSlot.toString();
  
  // Ищем скрытое поле по name внутри формы
  const formElement = document.getElementById('hudAddForm');
  var hiddenInput = formElement ? formElement.elements['img_' + slotNum] : null;
  var btn = document.getElementById('btn_' + slotNum);
  
  if (urlChoice.toLowerCase().startsWith("http")) {
    if (hiddenInput && btn) {
      hiddenInput.value = urlChoice; // Интегрируем интернет-ссылку в скрытый инпут для базы
      
      // НАМЕРТВО ФИКСИРУЕМ ВИЗУАЛЬНЫЙ СТАТУС НА ЭКРАНЕ
      btn.textContent = "ССЫЛКА ✓"; 
      btn.style.borderColor = "#00ff66";
      btn.style.color = "#00ff66";
      
      // Включаем крестик удаления фото для этого слота
      const cell = btn.parentElement;
      if (cell) {
        const xBtn = cell.querySelector('.nexus-delete-x');
        if (xBtn) xBtn.style.display = "block"; 
      }
      
      if (typeof runHudCascade === 'function') {
        runHudCascade(["ИНТЕРНЕТ-МЕДИА ИНТЕГРИРОВАНА В СЛОТ " + slotNum], "#00ff66");
      }
    }
  } else {
    alert("Критическая ошибка: Введен неверный формат. Ссылка должна начинаться с http:// или https://");
  }

  // ТЕПЕРЬ ЗАКРЫВАЕМ ОКНО В САМОМ КОНЦЕ, когда данные уже успешно сохранены!
  closeNexusCustomPrompt(); 
}

// ====================================================================
// ФУНКЦИЯ ОЧИСТКИ СЛОТА МЕДИА-МАТРИЦЫ ПО НАЖАТИЮ НА КРЕСТИК
// ====================================================================
function clearMediaSlot(slotNum) {
  var imgId = 'img_' + slotNum;
  var btnId = 'btn_' + slotNum;
  
  var hiddenInput = document.getElementById(imgId);
  var btn = document.getElementById(btnId);
  var cell = btn ? btn.parentElement : null;
  var xBtn = cell ? cell.querySelector('.nexus-delete-x') : null;
  
  if (hiddenInput) hiddenInput.value = ""; 
  if (btn) {
    btn.textContent = "ВЫБРАТЬ ФАЙЛ";
    btn.style.borderColor = "#1cfdff";
    btn.style.color = "#1cfdff";
  }
  if (xBtn) xBtn.style.display = "none";
  
  var fileInput = document.getElementById('file_' + slotNum);
  if (fileInput) fileInput.value = "";
}
</script>
